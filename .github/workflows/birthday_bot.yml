name: 🎂 Ежедневный поздравитель

on:
  schedule:
    # Каждый день в 6:00 UTC (9:00 МСК)
    - cron: '0 6 * * *'
  workflow_dispatch:   # Ручной запуск

jobs:
  congratulate:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: 📥 Получение кода из репозитория
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Установка зависимостей
        run: pip install -r requirements.txt

      - name: ⏳ Случайная задержка (только для автоматического запуска)
        if: github.event_name == 'schedule'
        run: |
          DELAY=$(( RANDOM % 3600 ))
          echo "Жду $DELAY секунд, чтобы поздравить в промежутке 9:00–10:00 МСК..."
          sleep $DELAY

      - name: 🚀 Запуск бота
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GIGACHAT_CLIENT_ID: ${{ secrets.GIGACHAT_CLIENT_ID }}
          GIGACHAT_CLIENT_SECRET: ${{ secrets.GIGACHAT_CLIENT_SECRET }}
          GIGACHAT_SCOPE: ${{ secrets.GIGACHAT_SCOPE }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credentials.json
          python bot.py