name: 🎂 Ежедневный поздравитель

on:
  schedule:
    # Запуск каждый день в 3:00 UTC (6:00 по Москве)
    - cron: '0 3 * * *'
  workflow_dispatch:   # Ручной запуск

jobs:
  congratulate:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # Достаточно для быстрой отправки

    steps:
      - name: 📥 Получение кода из репозитория
        uses: actions/checkout@v4

      - name: 🐍 Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Установка зависимостей
        run: pip install -r requirements.txt

      # Убираем шаг со случайной задержкой полностью

      - name: 🚀 Запуск бота
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GIGACHAT_CLIENT_ID: ${{ secrets.GIGACHAT_CLIENT_ID }}
          GIGACHAT_CLIENT_SECRET: ${{ secrets.GIGACHAT_CLIENT_SECRET }}
          GIGACHAT_SCOPE: ${{ secrets.GIGACHAT_SCOPE }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "$GOOGLE_CREDENTIALS" > credentials.json
          python bot.py